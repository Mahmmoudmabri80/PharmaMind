<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - نتائج رصد المضادات الحيوية</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #0f766e; /* Teal */
            --primary-hover: #115e59;
            --secondary: #14b8a6;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --radius-md: 0.5rem;
            --radius-lg: 1rem;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* شريط علوي (Navbar) */
        nav {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-md);
        }

        nav h1 {
            font-size: 1.5rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-export {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 0.6rem 1.2rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 700;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .btn-export:hover {
            background: white;
            color: var(--primary);
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        /* كروت الإحصائيات */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 1.5rem;
            border-right: 5px solid var(--primary);
        }

        .stat-icon {
            font-size: 2.5rem;
            color: var(--primary);
            opacity: 0.8;
        }

        .stat-details h3 {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 0.2rem;
        }

        .stat-details p {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-main);
        }

        /* قسم الفلترة */
        .filter-section {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            margin-bottom: 2rem;
        }

        .filter-section h2 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .filter-group label {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        .filter-group input, .filter-group select {
            padding: 0.7rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-family: inherit;
            outline: none;
        }

        .filter-group input:focus, .filter-group select:focus {
            border-color: var(--primary);
        }

        /* الجدول */
        .table-container {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            white-space: nowrap;
        }

        th, td {
            padding: 1rem 1.5rem;
            text-align: right;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #f8fafc;
            font-weight: 800;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        tr:hover {
            background-color: #f1f5f9;
        }

        .loading-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            font-size: 1.2rem;
            font-weight: 700;
        }

        .restricted-badge {
            background: #fee2e2;
            color: #b91c1c;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
        }

    </style>
</head>
<body>

    <nav>
        <h1><i class="fa-solid fa-chart-pie"></i> لوحة التحكم لنتائج المضادات الحيوية</h1>
        <button class="btn-export" onclick="exportTableToCSV('antibiotics_data.csv')">
            <i class="fa-solid fa-file-excel"></i> تصدير لملف إكسيل
        </button>
    </nav>

    <div class="container">
        <!-- الإحصائيات -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fa-solid fa-users"></i></div>
                <div class="stat-details">
                    <h3>إجمالي الحالات المرصودة</h3>
                    <p id="totalCount">0</p>
                </div>
            </div>
            <div class="stat-card" style="border-color: #ef4444;">
                <div class="stat-icon" style="color: #ef4444;"><i class="fa-solid fa-triangle-exclamation"></i></div>
                <div class="stat-details">
                    <h3>مضادات مقيدة تم صرفها</h3>
                    <p id="restrictedCount">0</p>
                </div>
            </div>
            <div class="stat-card" style="border-color: #f59e0b;">
                <div class="stat-icon" style="color: #f59e0b;"><i class="fa-solid fa-hospital"></i></div>
                <div class="stat-details">
                    <h3>المستشفى الأعلى استهلاكاً</h3>
                    <p id="topHospital" style="font-size: 1.1rem; margin-top: 5px;">-</p>
                </div>
            </div>
        </div>

        <!-- أدوات الفلترة -->
        <div class="filter-section">
            <h2><i class="fa-solid fa-filter"></i> تصفية وتصفح النتائج</h2>
            <div class="filter-grid">
                <div class="filter-group">
                    <label>بحث برقم الملف</label>
                    <input type="text" id="filterPatient" placeholder="اكتب رقم الملف..." oninput="applyFilters()">
                </div>
                <div class="filter-group">
                    <label>المستشفى</label>
                    <input type="text" id="filterHospital" list="dashboardHospitalList" placeholder="اكتب للبحث عن مستشفى..." oninput="applyFilters()">
                    <datalist id="dashboardHospitalList">
                        <option value="مستشفى الوحدة درنة">
                        <option value="مركز طبرق الطبي">
                        <option value="مستشفى بنغازي التعليمي">
                        <option value="مستشفى البيضاء">
                    </datalist>
                </div>
                <div class="filter-group">
                    <label>المضاد الحيوي</label>
                    <input type="text" id="filterAntibiotic" placeholder="مثال: Meropenem" oninput="applyFilters()">
                </div>
                <div class="filter-group">
                    <label>تاريخ التسجيل (من - إلى)</label>
                    <input type="date" id="filterDate" onchange="applyFilters()">
                </div>
            </div>
        </div>

        <!-- جدول البيانات -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>رقم الملف</th>
                        <th>المستشفى</th>
                        <th>القسم</th>
                        <th>المضاد الحيوي</th>
                        <th>الطريقة (Route)</th>
                        <th>السبب (Indication)</th>
                        <th>مزرعة؟</th>
                        <th>التاريخ</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="8" class="loading-state">
                            <i class="fa-solid fa-spinner fa-spin"></i> جاري جلب البيانات من السحابة...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // إعداد اتصال Supabase باستخدام الرابط والمفتاح الخاص بك
        const SUPABASE_URL = 'https://lgpapbbdvpltmbjqawcb.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxncGFwYmJkdnBsdG1ianFhd2NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NzIyNzEsImV4cCI6MjA5NDQ0ODI3MX0.7wLyJSbMEKLnavCr7BTRKtcXtlW8Mf7CzAHH68SXk24';
        
        let supabaseClient = null;
        let allRecords = []; // لتخزين كافة البيانات

        // جلب البيانات من القاعدة عند فتح الصفحة
        async function fetchData() {
            try {
                if (typeof supabase === 'undefined') {
                    throw new Error("مكتبة الاتصال بقاعدة البيانات لم يتم تحميلها. تأكد من اتصالك بالإنترنت وأن الجدار الناري لا يمنع الاتصال.");
                }

                // Initialize client if not already
                if (!supabaseClient) {
                    supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                }

                const { data, error } = await supabaseClient
                    .from('antibiotic_reports')
                    .select('*')
                    .order('created_at', { ascending: false }); // ترتيب من الأحدث للأقدم

                if (error) throw error;
                
                allRecords = data;
                updateStats(allRecords);
                renderTable(allRecords);

            } catch (err) {
                console.error('Error fetching data:', err);
                document.getElementById('tableBody').innerHTML = `
                    <tr><td colspan="8" class="loading-state" style="color: #ef4444;">
                        <i class="fa-solid fa-circle-exclamation"></i> فشل في جلب البيانات: ${err.message}
                    </td></tr>
                `;
            }
        }

        // دالة الفلترة (تعمل فوراً عند الكتابة أو الاختيار)
        function applyFilters() {
            const patientVal = document.getElementById('filterPatient').value.toLowerCase();
            const hospitalVal = document.getElementById('filterHospital').value;
            const antibioticVal = document.getElementById('filterAntibiotic').value.toLowerCase();
            const dateVal = document.getElementById('filterDate').value;

            const filteredData = allRecords.filter(row => {
                const matchPatient = !patientVal || (row.patient_file && row.patient_file.toLowerCase().includes(patientVal));
                const matchHospital = !hospitalVal || (row.hospital_name && row.hospital_name.toLowerCase().includes(hospitalVal.toLowerCase()));
                const matchAntibiotic = !antibioticVal || (row.antibiotic_name && row.antibiotic_name.toLowerCase().includes(antibioticVal));
                const matchDate = !dateVal || row.record_date === dateVal;

                return matchPatient && matchHospital && matchAntibiotic && matchDate;
            });

            renderTable(filteredData);
            updateStats(filteredData);
        }

        // عرض البيانات في الجدول
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="loading-state">لا توجد سجلات مطابقة للبحث 🔍</td></tr>`;
                return;
            }

            const restrictedList = ['Meropenem', 'Vancomycin', 'Linezolid'];

            tbody.innerHTML = data.map(row => {
                const isRestricted = restrictedList.includes(row.antibiotic_name);
                const antibioticDisplay = isRestricted 
                    ? `${row.antibiotic_name} <span class="restricted-badge">مقيد</span>` 
                    : row.antibiotic_name;

                return `
                    <tr>
                        <td style="font-weight: 800; color: var(--primary);">${row.patient_file || '-'}</td>
                        <td>${row.hospital_name || '-'}</td>
                        <td>${row.department_name || '-'}</td>
                        <td style="font-weight: bold;">${antibioticDisplay}</td>
                        <td>${row.route || '-'}</td>
                        <td>${row.indication || '-'}</td>
                        <td>${row.culture || '-'}</td>
                        <td>${row.record_date || '-'}</td>
                    </tr>
                `;
            }).join('');
        }

        // تحديث الإحصائيات أعلى الصفحة
        function updateStats(data) {
            document.getElementById('totalCount').innerText = data.length;

            const restrictedList = ['Meropenem', 'Vancomycin', 'Linezolid'];
            const restrictedCount = data.filter(row => restrictedList.includes(row.antibiotic_name)).length;
            document.getElementById('restrictedCount').innerText = restrictedCount;

            // حساب المستشفى الأكثر نشاطاً
            const hospitalCounts = {};
            data.forEach(row => {
                if (row.hospital_name) {
                    hospitalCounts[row.hospital_name] = (hospitalCounts[row.hospital_name] || 0) + 1;
                }
            });

            let topHosp = "-";
            let maxCount = 0;
            for (const [hosp, count] of Object.entries(hospitalCounts)) {
                if (count > maxCount) {
                    maxCount = count;
                    topHosp = hosp;
                }
            }
            
            document.getElementById('topHospital').innerText = topHosp !== "-" ? `${topHosp} (${maxCount} حالة)` : "-";
        }

        // تصدير الجدول إلى إكسيل (CSV)
        function exportTableToCSV(filename) {
            const csv = [];
            // أسماء الأعمدة (Header)
            csv.push("رقم الملف,المستشفى,القسم,المضاد الحيوي,الطريقة,السبب,مزرعة؟,التاريخ");
            
            const rows = document.querySelectorAll("table tr");
            // نبدأ من 1 لتخطي الـ Header الموجود في الـ DOM أصلاً
            for (let i = 1; i < rows.length; i++) {
                let row = [], cols = rows[i].querySelectorAll("td");
                for (let j = 0; j < cols.length; j++) {
                    // مسح كلمة "مقيد" من التصدير للإكسيل إن وجدت
                    let text = cols[j].innerText.replace('مقيد', '').trim();
                    row.push('"' + text + '"');
                }
                if (row.length > 0) csv.push(row.join(","));
            }

            const csvFile = new Blob(["\uFEFF" + csv.join("\n")], {type: "text/csv;charset=utf-8;"});
            const downloadLink = document.createElement("a");
            downloadLink.download = filename;
            downloadLink.href = window.URL.createObjectURL(csvFile);
            downloadLink.style.display = "none";
            document.body.appendChild(downloadLink);
            downloadLink.click();
        }

        // تشغيل جلب البيانات عند تحميل الصفحة
        window.onload = fetchData;
    </script>
</body>
</html>
